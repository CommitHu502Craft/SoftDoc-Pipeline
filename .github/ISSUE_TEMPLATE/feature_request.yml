name: Feature Request
description: 提出功能建议或改进方向
title: "[Feature] "
labels:
  - enhancement
body:
  - type: textarea
    id: background
    attributes:
      label: 背景与问题
      description: 你想解决什么问题
      placeholder: 例如：当前 Web UI 无法快速查看某类校验结果
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议方案
      description: 你希望怎样改
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 如果有其他思路，也可以写在这里

  - type: textarea
    id: impact
    attributes:
      label: 影响范围
      description: 是否涉及 CLI、API、GUI、Web UI、模板、配置或输出结构
      placeholder: |
        - CLI
        - API
        - GUI
        - Web UI
        - Config
        - Templates

  - type: checkboxes
    id: checks
    attributes:
      label: 提交前确认
      options:
        - label: 我愿意先讨论方案，而不是直接提交大范围 PR
          required: true
